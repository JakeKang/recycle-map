name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare CI env files for predeploy checks
        run: |
          cat > .env.development <<'EOF'
          NEXTAUTH_URL=http://localhost:3100
          NEXTAUTH_SECRET=ci-development-secret-value-with-32chars-minimum
          NEXT_PUBLIC_SUPABASE_URL=https://wrdmlvcyuaghogmhpeee.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_zFB1lttvGSfTgYUAFzg0NQ_auZ_efCq
          ALLOW_DEV_USER_HEADER=true
          ALLOW_DB_FALLBACK_ON_ERROR=true
          FORCE_LOCAL_STORE=true
          EOF

          cat > .env.production <<'EOF'
          NEXTAUTH_URL=https://ci.recyclemap.app
          NEXTAUTH_SECRET=ci-production-secret-value-with-32chars-minimum-2026
          NEXT_PUBLIC_SUPABASE_URL=https://wrdmlvcyuaghogmhpeee.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_zFB1lttvGSfTgYUAFzg0NQ_auZ_efCq
          ALLOW_DEV_USER_HEADER=false
          ALLOW_DB_FALLBACK_ON_ERROR=false
          FORCE_LOCAL_STORE=false
          ENABLE_TEST_ACCOUNTS=false
          EOF

      - name: Predeploy check (development)
        run: pnpm predeploy:check

      - name: Lint
        run: pnpm lint

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Dependency security audit
        run: pnpm security:audit

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm test:e2e -- e2e/ui-local.spec.ts e2e/api-local.spec.ts

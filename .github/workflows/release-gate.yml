name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Predeploy check (development)
        run: pnpm predeploy:check

      - name: Lint
        run: pnpm lint

      - name: Unit and integration tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Dependency security audit
        run: pnpm security:audit

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: E2E
        run: pnpm test:e2e -- e2e/ui-local.spec.ts e2e/api-local.spec.ts
